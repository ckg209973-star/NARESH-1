<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naresh Pratap</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.card{
    width:90%;
    max-width:420px;
    padding:30px 20px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 40px rgba(0,255,100,0.2);
    text-align:center;
    color:white;
}

.card h1{
    font-size:32px;
    font-weight:800;
    color:#8eff9b;
    letter-spacing:2px;
}

.card h2{
    font-size:20px;
    margin-top:10px;
    color:#ffd700;
    font-weight:600;
}

.feature{
    margin-top:20px;
    background: rgba(255,255,255,0.07);
    padding:12px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
    border-left:4px solid #8eff9b;
}

.check{
    width:22px;
    height:22px;
    background:#ffd700;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:black;
    font-size:14px;
    font-weight:bold;
}

.feature p{
    font-size:15px;
}

.btn{
    margin-top:25px;
    display:block;
    width:100%;
    padding:14px;
    border-radius:15px;
    font-size:16px;
    font-weight:700;
    text-decoration:none;
    transition:0.3s;
}

.main-btn{
    background:linear-gradient(45deg,#00c853,#64dd17);
    color:white;
    box-shadow:0 0 20px rgba(0,255,100,0.5);
}

.main-btn:hover{
    transform:scale(1.05);
}

.backup-btn{
    margin-top:15px;
    border:2px solid rgba(255,255,255,0.4);
    color:white;
    background:transparent;
}

.backup-btn:hover{
    background:rgba(255,255,255,0.1);
}

.footer-box{
    margin-top:20px;
    padding:10px;
    border-radius:12px;
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
}

.footer-box a{
    color:#8eff9b;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
}

.footer-box a:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="card">
    <h1>NARESH PRATAP</h1>
    <h2>PROFESSIONAL CRICKET ANALYST</h2>

    <div class="feature">
        <div class="check">✓</div>
        <p>20/20 Match Pass Accuracy</p>
    </div>

    <div class="feature">
        <div class="check">✓</div>
        <p>Grand Slam Expert Analysis</p>
    </div>

    <div class="feature">
        <div class="check">✓</div>
        <p>ATP/WTA Tournament Predictions</p>
    </div>

    <a href="https://t.me/+TxoNn2u_qbwzODI9" target="_blank" class="btn main-btn">
        JOIN MAIN CHANNEL
    </a>

    <a href="#" class="btn backup-btn">
        JOIN BACKUP CHANNEL
    </a>

    <div class="footer-box">
        <a href="https://t.me/+_ldYCcyc-qwwODU1" target="_blank">
            Ads By Ck Ads Agancy
        </a>
    </div>

</div>

</body>
</html>
